<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayTrade Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:       #0a0e1a;
    --bg2:      #111827;
    --bg3:      #1f2937;
    --border:   #2d3748;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --green:    #10b981;
    --green2:   #065f46;
    --red:      #ef4444;
    --red2:     #7f1d1d;
    --yellow:   #f59e0b;
    --blue:     #3b82f6;
    --purple:   #8b5cf6;
    --accent:   #06b6d4;
    --radius:   8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px; height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 16px; height: 52px; display: flex; align-items: center; gap: 16px;
    flex-shrink: 0;
  }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
  .logo span { color: var(--green); }
  #market-status {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    padding: 4px 10px; border-radius: 20px; background: var(--bg3);
    border: 1px solid var(--border); white-space: nowrap;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .status-dot.open { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .status-dot.closed { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .api-wrap {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
  }
  .api-wrap label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .api-wrap input {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius); padding: 5px 10px; font-size: 12px; width: 180px;
    outline: none;
  }
  .api-wrap input:focus { border-color: var(--accent); }
  .api-wrap input::placeholder { color: var(--muted); }
  #refresh-btn, #add-btn, .remove-btn {
    cursor: pointer; border: none; border-radius: var(--radius);
    font-size: 12px; padding: 5px 12px; transition: opacity .15s;
  }
  #refresh-btn:hover, #add-btn:hover { opacity: .8; }
  #refresh-btn {
    background: var(--accent); color: #000; font-weight: 600;
    display: flex; align-items: center; gap: 5px;
  }
  #api-calls { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* ── Layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar / Watchlist ── */
  aside {
    width: 220px; flex-shrink: 0; background: var(--bg2);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-title {
    padding: 10px 14px 8px; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; color: var(--muted); text-transform: uppercase;
    border-bottom: 1px solid var(--border); display: flex; align-items: center;
    justify-content: space-between;
  }
  #add-btn { background: var(--blue); color: #fff; font-weight: 600; padding: 3px 9px; font-size: 12px; }
  #watchlist { flex: 1; overflow-y: auto; padding: 6px 0; }
  #watchlist::-webkit-scrollbar { width: 4px; }
  #watchlist::-webkit-scrollbar-track { background: transparent; }
  #watchlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .stock-item {
    padding: 10px 14px; cursor: pointer; border-left: 3px solid transparent;
    transition: background .1s; display: flex; align-items: center; gap: 8px;
  }
  .stock-item:hover { background: var(--bg3); }
  .stock-item.active { background: var(--bg3); border-left-color: var(--accent); }
  .stock-item-info { flex: 1; min-width: 0; }
  .stock-ticker { font-weight: 700; font-size: 13px; }
  .stock-name { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stock-right { text-align: right; }
  .stock-price { font-size: 13px; font-weight: 600; }
  .stock-change { font-size: 11px; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--muted); }
  .signal-badge {
    font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: .5px;
  }
  .badge-sb { background: var(--green2); color: var(--green); }
  .badge-b  { background: #064e3b88; color: #6ee7b7; }
  .badge-h  { background: #374151; color: var(--muted); }
  .badge-s  { background: #7f1d1d88; color: #fca5a5; }
  .badge-ss { background: var(--red2); color: var(--red); }
  .remove-btn {
    background: transparent; color: var(--muted); padding: 2px 5px; font-size: 14px;
    opacity: 0; transition: opacity .15s;
  }
  .stock-item:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { color: var(--red); }
  .empty-state {
    padding: 24px 14px; color: var(--muted); font-size: 12px; text-align: center;
    line-height: 1.6;
  }

  /* ── Main Panel ── */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Stock Header */
  .stock-header {
    padding: 14px 20px 12px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    background: var(--bg2); flex-shrink: 0;
  }
  .header-ticker { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  .header-name { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-price { font-size: 28px; font-weight: 700; }
  .header-change { font-size: 16px; font-weight: 600; }
  .signal-large {
    padding: 6px 16px; border-radius: var(--radius); font-weight: 800;
    font-size: 14px; letter-spacing: .5px; text-transform: uppercase;
    margin-left: auto;
  }
  .sig-sb { background: var(--green2); color: var(--green); border: 1px solid var(--green); }
  .sig-b  { background: #064e3b55; color: #6ee7b7; border: 1px solid #6ee7b7; }
  .sig-h  { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .sig-s  { background: #7f1d1d55; color: #fca5a5; border: 1px solid #fca5a5; }
  .sig-ss { background: var(--red2); color: var(--red); border: 1px solid var(--red); }
  .score-bar-wrap { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .score-bar {
    width: 120px; height: 6px; background: var(--bg3); border-radius: 3px;
    overflow: hidden; position: relative;
  }
  .score-fill {
    height: 100%; border-radius: 3px; transition: width .3s, background .3s;
  }
  .last-update { font-size: 11px; color: var(--muted); }

  /* Chart + indicators */
  .content-area { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
  .content-area::-webkit-scrollbar { width: 5px; }
  .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .chart-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; position: relative;
  }
  .card-title {
    font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px;
  }
  .chart-wrap { position: relative; height: 240px; }
  #vol-chart-wrap { height: 80px; margin-top: 8px; }
  .time-btns { display: flex; gap: 6px; margin-bottom: 10px; }
  .time-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--muted);
    border-radius: 4px; padding: 3px 10px; font-size: 11px; cursor: pointer;
    transition: all .15s;
  }
  .time-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* Indicators grid */
  .indicators-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .ind-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px;
  }
  .ind-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .ind-value { font-size: 26px; font-weight: 700; }
  .ind-label { font-size: 11px; margin-top: 4px; }
  .ind-bar-wrap { margin-top: 8px; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; position: relative; }
  .ind-bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .ind-zones {
    display: flex; justify-content: space-between; font-size: 9px;
    color: var(--muted); margin-top: 3px;
  }

  .macd-row { display: flex; justify-content: space-between; margin-top: 6px; }
  .macd-item { text-align: center; }
  .macd-item .mi-val { font-size: 15px; font-weight: 600; }
  .macd-item .mi-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .bb-row { display: flex; gap: 8px; margin-top: 8px; font-size: 12px; }
  .bb-item { flex: 1; background: var(--bg3); border-radius: 4px; padding: 6px 8px; }
  .bb-item .bi-val { font-weight: 600; margin-top: 2px; }
  .bb-item .bi-lbl { font-size: 10px; color: var(--muted); }

  /* Signal explanation */
  .signal-explain {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px;
  }
  .votes-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .vote-chip {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px;
    border-radius: 20px; font-size: 12px; border: 1px solid var(--border);
    background: var(--bg3);
  }
  .vote-icon { font-size: 14px; }

  /* Loading/no-data */
  .placeholder {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; color: var(--muted);
  }
  .placeholder .ph-icon { font-size: 48px; }
  .placeholder .ph-text { font-size: 15px; }
  .placeholder .ph-sub { font-size: 12px; }

  .loading-spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 20px; right: 20px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 16px; font-size: 13px; z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,.5); opacity: 0;
    transform: translateY(10px); transition: all .25s;
  }
  .toast.show { opacity: 1; transform: none; }
  .toast.err { border-color: var(--red); color: var(--red); }
  .toast.ok  { border-color: var(--green); color: var(--green); }

  /* Add dialog */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; width: 320px;
  }
  .modal h3 { margin-bottom: 14px; font-size: 16px; }
  .modal input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius); padding: 8px 12px;
    font-size: 14px; outline: none; text-transform: uppercase;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
  .modal-btns button {
    padding: 7px 18px; border-radius: var(--radius); border: none;
    font-size: 13px; cursor: pointer; font-weight: 600;
  }
  #modal-cancel { background: var(--bg3); color: var(--text); }
  #modal-ok { background: var(--blue); color: #fff; }

  .spin-anim { animation: spin .6s linear infinite; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">DayTrade<span>Pro</span></div>
  <div id="market-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Checking market…</span>
  </div>
  <div class="api-wrap">
    <label>Alpha Vantage API Key:</label>
    <input type="password" id="api-key-input" placeholder="Enter your free API key…" autocomplete="off">
    <button id="refresh-btn"><span id="refresh-icon">↻</span> Refresh All</button>
    <span id="api-calls">Calls today: 0</span>
  </div>
</header>

<!-- Body -->
<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="sidebar-title">
      Watchlist
      <button id="add-btn">+ Add</button>
    </div>
    <div id="watchlist">
      <div class="empty-state" id="empty-hint">
        Add tickers to start tracking.<br>e.g. AAPL, TSLA, NVDA
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main id="main-panel">
    <div class="placeholder" id="placeholder">
      <div class="ph-icon">📈</div>
      <div class="ph-text">Select a stock to analyse</div>
      <div class="ph-sub">Add tickers using the + Add button on the left</div>
    </div>
  </main>

</div>

<!-- Add Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Add Stock</h3>
    <input type="text" id="ticker-input" placeholder="e.g. AAPL" maxlength="10">
    <div class="modal-btns">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-ok">Add</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const state = {
  watchlist: [],        // [{ticker, name, price, change, changePct, signal, votes}]
  selected: null,       // ticker string
  chartInstance: null,
  volChartInstance: null,
  callCount: 0,
  queue: [],
  processing: false,
};

// ── Persistence ──────────────────────────────────────────────────────────────
function saveLS() {
  localStorage.setItem('dtp_watchlist', JSON.stringify(state.watchlist.map(s => s.ticker)));
  localStorage.setItem('dtp_calls', state.callCount);
}
function loadLS() {
  const key = localStorage.getItem('dtp_apikey');
  if (key) document.getElementById('api-key-input').value = key;
  const tickers = JSON.parse(localStorage.getItem('dtp_watchlist') || '[]');
  tickers.forEach(t => addStock(t, false));
  state.callCount = parseInt(localStorage.getItem('dtp_calls') || '0');
  // reset daily
  const today = new Date().toDateString();
  const saved = localStorage.getItem('dtp_call_date');
  if (saved !== today) { state.callCount = 0; localStorage.setItem('dtp_call_date', today); }
  updateCallCounter();
}

// ── Market Hours ─────────────────────────────────────────────────────────────
function updateMarketStatus() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const day = et.getDay();
  const h = et.getHours(), m = et.getMinutes();
  const mins = h * 60 + m;
  const isWeekday = day >= 1 && day <= 5;
  const isOpen = isWeekday && mins >= 570 && mins < 960; // 9:30–16:00 ET
  const isPreMarket = isWeekday && mins >= 240 && mins < 570;
  const isAfterHours = isWeekday && mins >= 960 && mins < 1200;
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot';
  if (isOpen) { dot.classList.add('open'); txt.textContent = 'Market Open'; }
  else if (isPreMarket) { txt.textContent = 'Pre-Market'; }
  else if (isAfterHours) { txt.textContent = 'After Hours'; }
  else { dot.classList.add('closed'); txt.textContent = 'Market Closed'; }
}

// ── API ───────────────────────────────────────────────────────────────────────
function getApiKey() {
  const v = document.getElementById('api-key-input').value.trim();
  if (v) localStorage.setItem('dtp_apikey', v);
  return v;
}
function updateCallCounter() {
  document.getElementById('api-calls').textContent = `Calls today: ${state.callCount}`;
}
async function avFetch(params) {
  const key = getApiKey();
  if (!key) { showToast('Enter your Alpha Vantage API key first', 'err'); return null; }
  const url = new URL('https://www.alphavantage.co/query');
  url.searchParams.set('apikey', key);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  try {
    const res = await fetch(url.toString());
    const data = await res.json();
    state.callCount++;
    updateCallCounter();
    saveLS();
    if (data['Note'] || data['Information']) {
      showToast('API rate limit hit. Wait a minute then try again.', 'err');
      return null;
    }
    return data;
  } catch(e) {
    showToast('Network error. Check connection.', 'err');
    return null;
  }
}

// ── Technical Indicators ─────────────────────────────────────────────────────
function calcSMA(arr, p) {
  return arr.map((_, i) => {
    if (i < p - 1) return null;
    return arr.slice(i - p + 1, i + 1).reduce((a,b) => a+b, 0) / p;
  });
}
function calcEMA(arr, p) {
  const k = 2 / (p + 1);
  const ema = [arr[0]];
  for (let i = 1; i < arr.length; i++) ema.push(arr[i] * k + ema[i-1] * (1-k));
  return ema;
}
function calcRSI(closes, p = 14) {
  if (closes.length < p + 1) return null;
  let g = 0, l = 0;
  for (let i = 1; i <= p; i++) {
    const d = closes[i] - closes[i-1];
    if (d > 0) g += d; else l += Math.abs(d);
  }
  let ag = g / p, al = l / p;
  for (let i = p + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    ag = (ag * (p-1) + Math.max(d,0)) / p;
    al = (al * (p-1) + Math.max(-d,0)) / p;
  }
  if (al === 0) return 100;
  return 100 - (100 / (1 + ag / al));
}
function calcMACD(closes) {
  const e12 = calcEMA(closes, 12);
  const e26 = calcEMA(closes, 26);
  const line = e12.map((v, i) => v - e26[i]);
  const sig = calcEMA(line.slice(25), 9);
  const last = line[line.length-1];
  const s = sig[sig.length-1];
  return { macd: last, signal: s, hist: last - s };
}
function calcBB(closes, p = 20) {
  const sma = calcSMA(closes, p);
  const last = sma[sma.length-1];
  if (!last) return null;
  const slice = closes.slice(-p);
  const mean = slice.reduce((a,b) => a+b,0) / p;
  const sd = Math.sqrt(slice.reduce((s,v) => s + (v-mean)**2, 0) / p);
  return { upper: last + 2*sd, mid: last, lower: last - 2*sd };
}

function scoreSignal(closes, volumes) {
  const votes = [];
  const rsi = calcRSI(closes);
  if (rsi !== null) {
    if (rsi < 30) votes.push({ name: 'RSI', val: rsi.toFixed(1), vote: +1, reason: `Oversold (${rsi.toFixed(1)})` });
    else if (rsi > 70) votes.push({ name: 'RSI', val: rsi.toFixed(1), vote: -1, reason: `Overbought (${rsi.toFixed(1)})` });
    else votes.push({ name: 'RSI', val: rsi.toFixed(1), vote: 0, reason: `Neutral (${rsi.toFixed(1)})` });
  }
  const macd = calcMACD(closes);
  if (macd.hist > 0) votes.push({ name: 'MACD', vote: +1, reason: 'Bullish crossover' });
  else if (macd.hist < 0) votes.push({ name: 'MACD', vote: -1, reason: 'Bearish crossover' });
  else votes.push({ name: 'MACD', vote: 0, reason: 'No signal' });

  const sma20 = calcSMA(closes, 20);
  const lastSMA = sma20[sma20.length-1];
  const lastClose = closes[closes.length-1];
  if (lastSMA) {
    if (lastClose > lastSMA) votes.push({ name: 'SMA20', vote: +1, reason: `Price above SMA20` });
    else votes.push({ name: 'SMA20', vote: -1, reason: `Price below SMA20` });
  }
  const bb = calcBB(closes);
  if (bb) {
    if (lastClose < bb.lower) votes.push({ name: 'Bollinger', vote: +1, reason: 'Below lower band' });
    else if (lastClose > bb.upper) votes.push({ name: 'Bollinger', vote: -1, reason: 'Above upper band' });
    else votes.push({ name: 'Bollinger', vote: 0, reason: 'Inside bands' });
  }
  // Volume spike
  if (volumes && volumes.length > 10) {
    const avgVol = volumes.slice(-20, -1).reduce((a,b) => a+b,0) / 19;
    const lastVol = volumes[volumes.length-1];
    if (lastVol > avgVol * 1.5) votes.push({ name: 'Volume', vote: +1, reason: `Volume spike ×${(lastVol/avgVol).toFixed(1)}` });
    else votes.push({ name: 'Volume', vote: 0, reason: 'Normal volume' });
  }

  const score = votes.reduce((s, v) => s + v.vote, 0);
  let label, cls;
  if (score >= 2) { label = 'Strong Buy'; cls = 'sb'; }
  else if (score === 1) { label = 'Buy'; cls = 'b'; }
  else if (score === 0) { label = 'Hold'; cls = 'h'; }
  else if (score === -1) { label = 'Sell'; cls = 's'; }
  else { label = 'Strong Sell'; cls = 'ss'; }
  return { score, label, cls, votes, rsi, macd, bb };
}

// ── Data Fetching ─────────────────────────────────────────────────────────────
async function fetchQuote(ticker) {
  const data = await avFetch({ function: 'GLOBAL_QUOTE', symbol: ticker });
  if (!data || !data['Global Quote']) return null;
  const q = data['Global Quote'];
  return {
    ticker,
    price: parseFloat(q['05. price']),
    open: parseFloat(q['02. open']),
    high: parseFloat(q['03. high']),
    low: parseFloat(q['04. low']),
    volume: parseInt(q['06. volume']),
    change: parseFloat(q['09. change']),
    changePct: parseFloat(q['10. change percent']),
  };
}

async function fetchIntraday(ticker, interval = '5min') {
  const data = await avFetch({
    function: 'TIME_SERIES_INTRADAY',
    symbol: ticker,
    interval,
    outputsize: 'compact',
  });
  if (!data) return null;
  const key = `Time Series (${interval})`;
  if (!data[key]) return null;
  const entries = Object.entries(data[key]).sort((a,b) => a[0].localeCompare(b[0]));
  return entries.map(([time, v]) => ({
    time,
    open: parseFloat(v['1. open']),
    high: parseFloat(v['2. high']),
    low: parseFloat(v['3. low']),
    close: parseFloat(v['4. close']),
    volume: parseInt(v['5. volume']),
  }));
}

// ── Watchlist ─────────────────────────────────────────────────────────────────
function addStock(ticker, fetch = true) {
  ticker = ticker.toUpperCase().trim();
  if (!ticker) return;
  if (state.watchlist.find(s => s.ticker === ticker)) {
    showToast(`${ticker} already in watchlist`, 'err'); return;
  }
  state.watchlist.push({ ticker, name: ticker, price: null, change: 0, changePct: 0, signal: null, cls: 'h', votes: [] });
  renderWatchlist();
  saveLS();
  if (fetch) loadQuote(ticker);
}
function removeStock(ticker) {
  state.watchlist = state.watchlist.filter(s => s.ticker !== ticker);
  if (state.selected === ticker) {
    state.selected = null;
    renderMain(null);
  }
  renderWatchlist();
  saveLS();
}

async function loadQuote(ticker) {
  const q = await fetchQuote(ticker);
  if (!q) return;
  const s = state.watchlist.find(s => s.ticker === ticker);
  if (!s) return;
  s.price = q.price; s.change = q.change; s.changePct = q.changePct;
  renderWatchlist();
}

async function refreshAll() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spin-anim');
  for (const s of state.watchlist) {
    await loadQuote(s.ticker);
    await sleep(12000); // ~5 calls/min limit
  }
  icon.classList.remove('spin-anim');
  showToast('Watchlist refreshed', 'ok');
}

// ── Render Watchlist ──────────────────────────────────────────────────────────
function renderWatchlist() {
  const el = document.getElementById('watchlist');
  const empty = document.getElementById('empty-hint');
  if (!state.watchlist.length) {
    el.innerHTML = '';
    el.appendChild(empty);
    return;
  }
  if (el.contains(empty)) el.removeChild(empty);
  el.innerHTML = state.watchlist.map(s => {
    const price = s.price != null ? `$${s.price.toFixed(2)}` : '—';
    const pctCls = s.changePct > 0 ? 'pos' : s.changePct < 0 ? 'neg' : 'neu';
    const pct = s.changePct != null && s.price != null
      ? `${s.changePct > 0 ? '+' : ''}${s.changePct.toFixed(2)}%` : '';
    const badge = s.signal
      ? `<span class="signal-badge badge-${s.cls}">${s.signal}</span>` : '';
    return `
      <div class="stock-item ${state.selected === s.ticker ? 'active' : ''}"
           onclick="selectStock('${s.ticker}')">
        <div class="stock-item-info">
          <div class="stock-ticker">${s.ticker}</div>
          ${badge}
        </div>
        <div class="stock-right">
          <div class="stock-price">${price}</div>
          <div class="stock-change ${pctCls}">${pct}</div>
        </div>
        <button class="remove-btn" onclick="event.stopPropagation();removeStock('${s.ticker}')">✕</button>
      </div>`;
  }).join('');
}

// ── Select & Analyse Stock ────────────────────────────────────────────────────
async function selectStock(ticker) {
  state.selected = ticker;
  renderWatchlist();
  renderMain('loading');
  const [quote, intraday] = await Promise.all([
    fetchQuote(ticker),
    fetchIntraday(ticker),
  ]);
  if (!quote || !intraday || intraday.length < 30) {
    renderMain('error');
    showToast('Could not load data. Check ticker & API key.', 'err');
    return;
  }
  const closes = intraday.map(d => d.close);
  const volumes = intraday.map(d => d.volume);
  const analysis = scoreSignal(closes, volumes);

  const s = state.watchlist.find(s => s.ticker === ticker);
  if (s) {
    s.price = quote.price; s.change = quote.change; s.changePct = quote.changePct;
    s.signal = analysis.label; s.cls = analysis.cls; s.votes = analysis.votes;
  }
  renderWatchlist();
  renderMain('data', { quote, intraday, analysis });
}

// ── Render Main ───────────────────────────────────────────────────────────────
function renderMain(mode, payload) {
  const el = document.getElementById('main-panel');
  if (mode === 'loading') {
    el.innerHTML = `<div class="placeholder"><div class="loading-spinner"></div><div class="ph-text">Loading data…</div></div>`;
    return;
  }
  if (mode === 'error') {
    el.innerHTML = `<div class="placeholder"><div class="ph-icon">⚠️</div><div class="ph-text">Failed to load</div><div class="ph-sub">Check your API key and ticker symbol</div></div>`;
    return;
  }
  if (!mode || !payload) {
    el.innerHTML = `<div class="placeholder" id="placeholder"><div class="ph-icon">📈</div><div class="ph-text">Select a stock to analyse</div><div class="ph-sub">Add tickers using the + Add button on the left</div></div>`;
    return;
  }

  const { quote, intraday, analysis } = payload;
  const { score, label, cls, votes, rsi, macd, bb } = analysis;
  const closes = intraday.map(d => d.close);
  const lastClose = closes[closes.length-1];

  const pctCls = quote.changePct > 0 ? 'pos' : quote.changePct < 0 ? 'neg' : 'neu';
  const pctStr = `${quote.changePct > 0 ? '+' : ''}${quote.changePct.toFixed(2)}%`;
  const chgStr = `${quote.change >= 0 ? '+' : ''}${quote.change.toFixed(2)}`;
  const normScore = Math.min(Math.max((score + 4) / 8 * 100, 0), 100);
  const scoreColor = score >= 1 ? 'var(--green)' : score <= -1 ? 'var(--red)' : 'var(--yellow)';
  const now = new Date().toLocaleTimeString();

  // BB position bar
  let bbBar = '', bbSection = '';
  if (bb) {
    const range = bb.upper - bb.lower;
    const pos = range > 0 ? Math.min(Math.max((lastClose - bb.lower) / range * 100, 0), 100) : 50;
    const bbClr = lastClose > bb.upper ? 'var(--red)' : lastClose < bb.lower ? 'var(--green)' : 'var(--yellow)';
    bbSection = `
      <div class="bb-row">
        <div class="bb-item"><div class="bi-lbl">Upper</div><div class="bi-val">$${bb.upper.toFixed(2)}</div></div>
        <div class="bb-item"><div class="bi-lbl">Middle</div><div class="bi-val">$${bb.mid.toFixed(2)}</div></div>
        <div class="bb-item"><div class="bi-lbl">Lower</div><div class="bi-val">$${bb.lower.toFixed(2)}</div></div>
      </div>
      <div class="ind-bar-wrap" style="margin-top:10px">
        <div class="ind-bar-fill" style="width:${pos}%;background:${bbClr}"></div>
      </div>
      <div class="ind-zones"><span>Oversold</span><span>Position in band</span><span>Overbought</span></div>`;
  }

  // RSI color
  const rsiVal = rsi != null ? rsi : 50;
  const rsiClr = rsiVal < 30 ? 'var(--green)' : rsiVal > 70 ? 'var(--red)' : 'var(--yellow)';
  const rsiLabel = rsiVal < 30 ? '🟢 Oversold — Buy zone' : rsiVal > 70 ? '🔴 Overbought — Sell zone' : '🟡 Neutral';

  // MACD color
  const macdClr = macd.hist > 0 ? 'var(--green)' : 'var(--red)';
  const macdLabel = macd.hist > 0 ? '🟢 Bullish momentum' : '🔴 Bearish momentum';

  // Votes
  const voteChips = votes.map(v => {
    const icon = v.vote > 0 ? '🟢' : v.vote < 0 ? '🔴' : '🟡';
    const vCls = v.vote > 0 ? 'pos' : v.vote < 0 ? 'neg' : 'neu';
    return `<div class="vote-chip"><span class="vote-icon">${icon}</span><span><b>${v.name}:</b> <span class="${vCls}">${v.reason}</span></span></div>`;
  }).join('');

  el.innerHTML = `
    <div class="stock-header">
      <div>
        <div class="header-ticker">${quote.ticker}</div>
        <div class="header-name">Intraday Analysis</div>
      </div>
      <div>
        <div class="header-price">$${quote.price.toFixed(2)}</div>
        <div class="header-change ${pctCls}">${chgStr} (${pctStr})</div>
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">O: $${quote.open.toFixed(2)} &nbsp; H: $${quote.high.toFixed(2)} &nbsp; L: $${quote.low.toFixed(2)}</div>
        <div class="score-bar-wrap">
          <span style="font-size:11px;color:var(--muted)">Signal strength</span>
          <div class="score-bar">
            <div class="score-fill" style="width:${normScore}%;background:${scoreColor}"></div>
          </div>
          <span style="font-size:11px;color:${scoreColor}">${score > 0 ? '+' : ''}${score}</span>
        </div>
      </div>
      <div class="signal-large sig-${cls}">${label}</div>
      <div class="last-update" style="margin-left:0">Updated ${now}</div>
    </div>

    <div class="content-area">
      <!-- Price Chart -->
      <div class="chart-card">
        <div class="card-title">Price Chart (5-min intraday)</div>
        <div class="chart-wrap"><canvas id="price-chart"></canvas></div>
        <div id="vol-chart-wrap"><canvas id="vol-chart"></canvas></div>
      </div>

      <!-- Indicators -->
      <div class="indicators-grid">
        <!-- RSI -->
        <div class="ind-card">
          <div class="ind-title">RSI (14)</div>
          <div class="ind-value" style="color:${rsiClr}">${rsiVal.toFixed(1)}</div>
          <div class="ind-label">${rsiLabel}</div>
          <div class="ind-bar-wrap">
            <div class="ind-bar-fill" style="width:${rsiVal}%;background:${rsiClr}"></div>
          </div>
          <div class="ind-zones"><span>0 Oversold</span><span>30</span><span>70</span><span>100 Overbought</span></div>
        </div>

        <!-- MACD -->
        <div class="ind-card">
          <div class="ind-title">MACD (12,26,9)</div>
          <div class="ind-value" style="color:${macdClr}">${macd.hist >= 0 ? '+' : ''}${macd.hist.toFixed(4)}</div>
          <div class="ind-label">${macdLabel}</div>
          <div class="macd-row">
            <div class="macd-item">
              <div class="mi-val" style="color:var(--blue)">${macd.macd.toFixed(4)}</div>
              <div class="mi-lbl">MACD Line</div>
            </div>
            <div class="macd-item">
              <div class="mi-val" style="color:var(--purple)">${macd.signal.toFixed(4)}</div>
              <div class="mi-lbl">Signal Line</div>
            </div>
            <div class="macd-item">
              <div class="mi-val" style="color:${macdClr}">${macd.hist >= 0 ? '+' : ''}${macd.hist.toFixed(4)}</div>
              <div class="mi-lbl">Histogram</div>
            </div>
          </div>
        </div>

        <!-- Bollinger Bands -->
        <div class="ind-card">
          <div class="ind-title">Bollinger Bands (20,2)</div>
          <div class="ind-value" style="color:var(--accent)">$${lastClose.toFixed(2)}</div>
          <div class="ind-label">Current price position</div>
          ${bbSection}
        </div>
      </div>

      <!-- Signal explanation -->
      <div class="signal-explain">
        <div class="ind-title">Signal Breakdown — ${label} (score: ${score > 0 ? '+' : ''}${score})</div>
        <div class="votes-grid">${voteChips}</div>
      </div>
    </div>`;

  // Draw charts after DOM update
  requestAnimationFrame(() => drawCharts(intraday, closes));
}

// ── Charts ────────────────────────────────────────────────────────────────────
function drawCharts(intraday, closes) {
  if (state.chartInstance) { state.chartInstance.destroy(); state.chartInstance = null; }
  if (state.volChartInstance) { state.volChartInstance.destroy(); state.volChartInstance = null; }

  const labels = intraday.map(d => d.time.split(' ')[1].slice(0,5));
  const prices = intraday.map(d => d.close);
  const volumes = intraday.map(d => d.volume);
  const sma20 = calcSMA(closes, 20);
  const ema9  = calcEMA(closes, 9);

  const priceCtx = document.getElementById('price-chart');
  if (!priceCtx) return;
  state.chartInstance = new Chart(priceCtx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Price', data: prices, borderColor: '#06b6d4', borderWidth: 2,
          pointRadius: 0, fill: true,
          backgroundColor: ctx => {
            const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 240);
            g.addColorStop(0, 'rgba(6,182,212,.15)');
            g.addColorStop(1, 'rgba(6,182,212,0)');
            return g;
          },
          tension: 0.2,
        },
        {
          label: 'SMA 20', data: sma20, borderColor: '#f59e0b', borderWidth: 1.5,
          borderDash: [4,3], pointRadius: 0, fill: false, tension: 0.2,
        },
        {
          label: 'EMA 9', data: ema9, borderColor: '#8b5cf6', borderWidth: 1.5,
          borderDash: [2,2], pointRadius: 0, fill: false, tension: 0.2,
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: { duration: 400 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#64748b', boxWidth: 12, font: { size: 11 } } },
        tooltip: {
          backgroundColor: '#1f2937', borderColor: '#2d3748', borderWidth: 1,
          titleColor: '#e2e8f0', bodyColor: '#94a3b8',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y?.toFixed(2) ?? '—'}`,
          },
        },
      },
      scales: {
        x: {
          ticks: { color: '#64748b', font: { size: 10 }, maxTicksLimit: 12 },
          grid: { color: '#1f2937' },
        },
        y: {
          ticks: { color: '#64748b', font: { size: 10 }, callback: v => `$${v.toFixed(2)}` },
          grid: { color: '#1f293788' },
          position: 'right',
        },
      },
    },
  });

  // Volume chart
  const volCtx = document.getElementById('vol-chart');
  if (!volCtx) return;
  const avgVol = volumes.reduce((a,b) => a+b,0) / volumes.length;
  state.volChartInstance = new Chart(volCtx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Volume',
        data: volumes,
        backgroundColor: volumes.map(v => v > avgVol * 1.5 ? 'rgba(16,185,129,.6)' : 'rgba(100,116,139,.3)'),
        borderWidth: 0,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#1f2937', borderColor: '#2d3748', borderWidth: 1,
        bodyColor: '#94a3b8',
        callbacks: { label: ctx => ` Vol: ${ctx.parsed.y.toLocaleString()}` },
      }},
      scales: {
        x: { display: false },
        y: {
          ticks: { color: '#64748b', font: { size: 9 }, callback: v => v >= 1e6 ? `${(v/1e6).toFixed(1)}M` : v >= 1e3 ? `${(v/1e3).toFixed(0)}K` : v },
          grid: { color: '#1f2937' }, position: 'right',
        },
      },
    },
  });
}

// ── UI Helpers ────────────────────────────────────────────────────────────────
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Modal ─────────────────────────────────────────────────────────────────────
document.getElementById('add-btn').onclick = () => {
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('ticker-input').focus(), 50);
};
document.getElementById('modal-cancel').onclick = closeModal;
document.getElementById('modal-overlay').onclick = e => { if (e.target.id === 'modal-overlay') closeModal(); };
document.getElementById('ticker-input').onkeydown = e => { if (e.key === 'Enter') doAdd(); };
document.getElementById('modal-ok').onclick = doAdd;
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('ticker-input').value = '';
}
function doAdd() {
  const v = document.getElementById('ticker-input').value.trim().toUpperCase();
  if (v) { addStock(v); closeModal(); }
}

document.getElementById('refresh-btn').onclick = refreshAll;

// ── Init ──────────────────────────────────────────────────────────────────────
updateMarketStatus();
setInterval(updateMarketStatus, 60000);
loadLS();

// Auto-refresh watchlist quotes every 5 minutes if key present
setInterval(() => {
  if (getApiKey() && state.watchlist.length) {
    state.watchlist.forEach((s, i) => {
      setTimeout(() => loadQuote(s.ticker), i * 13000);
    });
  }
}, 5 * 60 * 1000);
</script>
